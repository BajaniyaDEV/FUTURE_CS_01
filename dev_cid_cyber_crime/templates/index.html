<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CID Cyber Crime Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>">
</head>
<body>
    <div class="app-container">
        <!-- Cyber Background -->
        <div class="cyber-background">
            <div class="cyber-grid"></div>
            <div class="scan-line"></div>
            <div class="floating-particles">
                <!-- Particles will be generated by JavaScript -->
            </div>
            <!-- Corner decorations -->
            <div class="corner-decoration top-left"></div>
            <div class="corner-decoration top-right"></div>
            <div class="corner-decoration bottom-left"></div>
            <div class="corner-decoration bottom-right"></div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <header class="app-header">
                <div class="header-content">
                    <div class="logo-section">
                        <div class="logo-container">
                            <img src="https://pbs.twimg.com/profile_images/1579353190239125505/eJQ6CjIk_400x400.jpg" 
                                 alt="CID Cyber Crime Logo" class="logo-image">
                            <div class="logo-border"></div>
                        </div>
                        <div class="title-section">
                            <h1 class="cyber-title">CID CYBER CRIME</h1>
                        </div>
                    </div>

                    <div class="controls-section">
                        <!-- Search Box -->
                        <form class="search-form" id="searchForm">
                            <div class="search-container">
                                <svg class="search-icon" viewBox="0 0 24 24">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <path d="21 21L16.514 16.506"></path>
                                </svg>
                                <input type="text" id="searchInput" placeholder="Enter search query..." class="search-input">
                            </div>
                        </form>

                        <!-- Control Buttons -->
                        <div class="button-group">
                            <button class="cyber-button start-button" id="startBtn">
                                <svg class="button-icon" viewBox="0 0 24 24">
                                    <polygon points="5,3 19,12 5,21"></polygon>
                                </svg>
                                START
                            </button>
                            
                            <button class="cyber-button stop-button" id="stopBtn">
                                <svg class="button-icon" viewBox="0 0 24 24">
                                    <rect x="6" y="6" width="12" height="12"></rect>
                                </svg>
                                STOP
                            </button>
                            
                            <button class="cyber-button refresh-button" id="refreshBtn">
                                <svg class="button-icon" viewBox="0 0 24 24">
                                    <polyline points="23,4 23,10 17,10"></polyline>
                                    <path d="M20.49,15a9,9,0,1,1-2.12-9.36L23,10"></path>
                                </svg>
                                REFRESH
                            </button>
                            
                            <button class="cyber-button screenshot-button" id="screenshotBtn">
                                <svg class="button-icon" viewBox="0 0 24 24">
                                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                                    <circle cx="12" cy="13" r="4"></circle>
                                </svg>
                                SCREENSHOT
                            </button>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Main Layout -->
            <div class="main-layout">
                <!-- Filter Sidebar -->
                <aside class="filter-sidebar">
                    <div class="filter-header">
                        <svg class="filter-icon" viewBox="0 0 24 24">
                            <polygon points="22,3 2,3 10,12.46 10,19 14,21 14,12.46"></polygon>
                        </svg>
                        <h3>SEARCH FILTERS</h3>
                    </div>

                    <div class="filter-card">
                        <div class="filter-title">
                            <svg class="clock-icon" viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12,6 12,12 16,14"></polyline>
                            </svg>
                            <span>Time Range</span>
                        </div>
                        
                        <div class="radio-group" id="timeRangeGroup">
                            <div class="radio-item">
                                <input type="radio" id="all" name="timeRange" value="all" checked>
                                <label for="all">All</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="hour" name="timeRange" value="hour">
                                <label for="hour">Past Hour</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="day" name="timeRange" value="day">
                                <label for="day">Past 24 Hours</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="week" name="timeRange" value="week">
                                <label for="week">Past Week</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="month" name="timeRange" value="month">
                                <label for="month">Past Month</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="year" name="timeRange" value="year">
                                <label for="year">Past Year</label>
                            </div>
                        </div>
                    </div>
                </aside>

                <!-- Main Content Area -->
                <main class="content-area">
                    <div class="search-results-card" id="resultsCard">
                        <div class="empty-state" id="emptyState">
                            <div class="search-icon-large">
                                <svg viewBox="0 0 24 24">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <path d="21 21L16.514 16.506"></path>
                                </svg>
                            </div>
                            <h2>SEARCH RESULTS</h2>
                            <p>Enter a search query and click START to begin monitoring</p>
                            <span class="ready-badge">READY FOR INPUT</span>
                        </div>

                        <div class="results-content" id="resultsContent" style="display: none;">
                            <div class="results-header">
                                <h2 id="resultsTitle">SEARCH RESULTS</h2>
                                <div class="results-meta">
                                    <span id="resultCount">0 results</span>
                                    <span id="searchQuery"></span>
                                </div>
                            </div>
                            <div class="results-list" id="resultsList">
                                <!-- Results will be populated by JavaScript -->
                            </div>
                        </div>

                        <!-- Progress Bar -->
                        <div class="progress-container" id="progressContainer" style="display: none;">
                            <div class="progress-bar">
                                <div class="progress-fill" id="progressFill"></div>
                            </div>
                            <div class="progress-text" id="progressText">Searching...</div>
                        </div>
                    </div>
                </main>
            </div>
        </div>

        <!-- Status Messages -->
        <div class="status-messages" id="statusMessages">
            <!-- Status messages will be added dynamically -->
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
